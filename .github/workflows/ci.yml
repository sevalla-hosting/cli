name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify CLI runs
        run: node dist/index.js --version

  release:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      released: ${{ steps.get-tag.outputs.released }}
      tag: ${{ steps.get-tag.outputs.tag }}
      version: ${{ steps.get-tag.outputs.version }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
        id: release

      - name: Get release tag
        id: get-tag
        run: |
          git fetch --tags
          TAG=$(git tag --points-at HEAD 2>/dev/null | grep '^v' | head -1)
          if [ -n "$TAG" ]; then
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          fi

  binaries:
    needs: release
    runs-on: ubuntu-latest
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build binaries
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          mkdir -p binaries

          targets=(
            "bun-linux-x64"
            "bun-linux-arm64"
            "bun-darwin-x64"
            "bun-darwin-arm64"
            "bun-windows-x64"
          )

          for target in "${targets[@]}"; do
            os_arch="${target#bun-}"
            outfile="binaries/sevalla-${os_arch}"
            if [[ "$target" == *"windows"* ]]; then
              outfile="${outfile}.exe"
            fi
            echo "Building ${outfile}..."
            bun build src/index.ts --compile --target="${target}" \
              --define "__CLI_VERSION__=\"${VERSION}\"" \
              --outfile "${outfile}"
          done

          cd binaries
          for f in sevalla-linux-* sevalla-darwin-*; do
            [[ "$f" == *.tar.gz ]] && continue
            tar -czf "${f}.tar.gz" "$f"
          done

          sha256sum sevalla-* > checksums.txt
          cat checksums.txt

      - name: Upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: gh release upload "$TAG" binaries/* --clobber

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          DARWIN_ARM64_SHA=$(grep "sevalla-darwin-arm64.tar.gz" binaries/checksums.txt | awk '{print $1}')
          DARWIN_X64_SHA=$(grep "sevalla-darwin-x64.tar.gz" binaries/checksums.txt | awk '{print $1}')
          LINUX_ARM64_SHA=$(grep "sevalla-linux-arm64.tar.gz" binaries/checksums.txt | awk '{print $1}')
          LINUX_X64_SHA=$(grep "sevalla-linux-x64.tar.gz" binaries/checksums.txt | awk '{print $1}')

          RELEASE_URL="https://github.com/sevalla-hosting/cli/releases/download/v${VERSION}"

          cat > /tmp/sevalla.rb << FORMULA
          class Sevalla < Formula
            desc "Official CLI for the Sevalla cloud platform"
            homepage "https://github.com/sevalla-hosting/cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${RELEASE_URL}/sevalla-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              end
              on_intel do
                url "${RELEASE_URL}/sevalla-darwin-x64.tar.gz"
                sha256 "${DARWIN_X64_SHA}"
              end
            end

            on_linux do
              on_arm do
                url "${RELEASE_URL}/sevalla-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              end
              on_intel do
                url "${RELEASE_URL}/sevalla-linux-x64.tar.gz"
                sha256 "${LINUX_X64_SHA}"
              end
            end

            def install
              bin.install Dir["sevalla-*"].first => "sevalla"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/sevalla --version")
            end
          end
          FORMULA

          mkdir -p ~/.ssh
          echo "$HOMEBREW_TAP_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes"

          git clone git@github.com:sevalla-hosting/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp /tmp/sevalla.rb tap/Formula/sevalla.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sevalla.rb
          git commit -m "Update sevalla to ${VERSION}"
          git push
