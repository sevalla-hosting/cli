name: E2E Tests

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: applications
            file: e2e/tests/applications.test.ts
          - name: databases
            file: e2e/tests/databases.test.ts
          - name: static-sites
            file: e2e/tests/static-sites.test.ts
          - name: load-balancers
            file: e2e/tests/load-balancers.test.ts
          - name: object-storage
            file: e2e/tests/object-storage.test.ts
          - name: pipelines
            file: e2e/tests/pipelines.test.ts
          - name: projects
            file: e2e/tests/projects.test.ts
          - name: webhooks
            file: e2e/tests/webhooks.test.ts
          - name: api-keys
            file: e2e/tests/api-keys.test.ts
          - name: docker-registries
            file: e2e/tests/docker-registries.test.ts
          - name: common
            file: e2e/tests/common.test.ts
          - name: resources
            file: e2e/tests/resources.test.ts
    name: e2e (${{ matrix.suite.name }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: node --test '${{ matrix.suite.file }}'
        env:
          API_KEY: ${{ secrets.E2E_TEST_API_KEY }}

  cleanup:
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()
    name: e2e (cleanup)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: npm run test:e2e:teardown
        env:
          API_KEY: ${{ secrets.E2E_TEST_API_KEY }}
